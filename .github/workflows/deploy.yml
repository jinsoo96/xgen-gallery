name: Deploy to go244

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-go244
  cancel-in-progress: false

jobs:
  deploy:
    # Self-hosted runner installed on go244 itself — no SSH / jump host / firewall hops.
    # The runner only needs OUTBOUND https to GitHub, which already works.
    runs-on: [self-hosted, go244]
    timeout-minutes: 15
    steps:
      - name: Deploy (local on go244)
        env:
          # Repo → Settings → Secrets and variables → Actions 의 OAUTH_CLIENT_SECRET(등록됨)을
          # 주입한다. 매 배포마다 아래 시드 단계가 go244의 .env에 자동으로 써 넣는다.
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          cd ~/workspace/xgen-gallery
          echo "=== pulling ==="
          git fetch origin main
          git reset --hard origin/main
          git log -1 --oneline
          echo "=== seeding OAuth creds into .env (idempotent) ==="
          touch .env
          # Client ID는 공개값이라 코드 기본값이 있지만, .env에도 기록해 일관성 유지.
          grep -q '^GITHUB_OAUTH_CLIENT_ID=' .env \
            || echo 'GITHUB_OAUTH_CLIENT_ID=Ov23liv3gveHfTPsLH2Z' >> .env
          # Secret은 CI 시크릿이 주어졌을 때만 upsert(없으면 기존 .env 값 유지).
          if [ -n "${GH_OAUTH_CLIENT_SECRET:-}" ]; then
            if grep -q '^GITHUB_OAUTH_CLIENT_SECRET=' .env; then
              sed -i "s#^GITHUB_OAUTH_CLIENT_SECRET=.*#GITHUB_OAUTH_CLIENT_SECRET=${GH_OAUTH_CLIENT_SECRET}#" .env
            else
              echo "GITHUB_OAUTH_CLIENT_SECRET=${GH_OAUTH_CLIENT_SECRET}" >> .env
            fi
            echo "  → CI 시크릿(OAUTH_CLIENT_SECRET)으로 GITHUB_OAUTH_CLIENT_SECRET 주입함"
          else
            echo "  → CI 시크릿(OAUTH_CLIENT_SECRET) 미설정 — .env의 기존 값 사용"
          fi
          echo "=== rebuilding ==="
          docker compose up -d --build
          docker image prune -f
          echo "=== verify OAuth env in running container ==="
          if docker compose exec -T frontend printenv GITHUB_OAUTH_CLIENT_SECRET >/dev/null 2>&1; then
            echo "  OAUTH_SECRET=present ✓ (로그인 정상 동작)"
          else
            echo "  OAUTH_SECRET=MISSING ✗ — OAUTH_CLIENT_SECRET 시크릿을 등록하거나 .env에 넣으세요"
          fi
          echo "=== health ==="
          sleep 10
          curl -sSf -o /dev/null -w "backend=%{http_code} " --max-time 10 http://localhost:8800/health
          curl -sSf -o /dev/null -w "frontend=%{http_code}\n" --max-time 10 http://localhost:3100/
