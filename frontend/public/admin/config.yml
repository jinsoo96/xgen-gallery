# Decap CMS 설정 — 블로그 글을 DB 없이 git 리포지토리의 마크다운 파일로 관리한다.
# 경로는 리포지토리 루트(c:\Hompy = PlateerLab/xgen-gallery) 기준이다.
#
# ── 로컬 편집(즉시 사용) ───────────────────────────────────────
#   1) 리포 루트에서  npx decap-server   실행
#   2) 브라우저에서   http://localhost:3100/admin/   접속 → 바로 글 작성/커밋
#   (local_backend: true 일 때 GitHub OAuth 없이 로컬 파일로 저장)
#
# ── 운영(GitHub에 직접 커밋) ───────────────────────────────────
#   GitHub OAuth 제공자가 필요하다(자세한 설정: docs/blog-cms.md).
#   OAuth 배포 후 local_backend 줄을 주석 처리하면 GitHub 백엔드로 동작한다.

backend:
    name: github
    repo: PlateerLab/xgen-gallery
    branch: main
    # 우리 Next 앱이 OAuth 제공자 역할(/api/auth, /api/callback).
    # base_url 은 /api/auth 가 있는 origin = 운영 도메인. 어드민을 어느 URL에서 열든
    # OAuth 팝업은 이 origin으로 향한다(로컬 편집은 아래 local_backend가 처리).
    base_url: https://labs.plateer.com
    auth_endpoint: /api/auth

# 로컬 편집 모드 — localhost에서 /admin 접속 시 `npx decap-server`(:8081)로 로컬
# 파일에 바로 저장(GitHub/OAuth 불필요). 실제 도메인에서는 무시되고 위 github 백엔드 사용.
# ⚠ localhost에서 이 값이 true면 반드시 리포 루트에서 `npx decap-server`가 떠 있어야 함.
local_backend: true

media_folder: "frontend/public/blog"
public_folder: "/blog"

publish_mode: editorial_workflow

collections:
    - name: blog
      label: "Blog"
      label_singular: "글"
      folder: "frontend/content/blog"
      create: true
      slug: "{{slug}}"
      extension: "md"
      format: "frontmatter"
      preview_path: "blog/{{slug}}"
      fields:
          - { name: title, label: "제목", widget: string, hint: "핵심 키워드를 앞에. 마침표 없이(≤60자 권장) — SEO 제목·OG 제목으로 쓰임" }
          - { name: description, label: "설명(요약)", widget: text, pattern: ['^.{1,160}$', '160자 이내로 작성하세요'], hint: "검색 결과·AI 답변에 그대로 노출되는 한 줄 요약. 질문에 대한 자족적 답변처럼 40~155자(GEO)" }
          - { name: date, label: "발행일", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
          - { name: updated, label: "수정일", widget: datetime, required: false, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD", hint: "내용을 고쳤을 때만. 검색엔진 신선도(freshness) 신호" }
          - { name: author, label: "작성자", widget: string, default: "Plateer Labs" }
          - {
                name: category,
                label: "카테고리",
                widget: select,
                options: ["Case Study", "Tech Note", "제품 소식"],
                default: "Tech Note",
                hint: "글의 유형. 목록 상단 탭으로 필터됨",
            }
          - { name: tags, label: "태그(주제)", widget: list, required: false, hint: "주제 엔티티를 태그로. 예: 온톨로지, 하네스, 인프라, RAG, 보안 — 목록 주제 필터·SEO 키워드·GEO 엔티티 커버리지로 쓰임" }
          - { name: cover, label: "커버 이미지", widget: image, required: false, choose_url: false, hint: "SNS 공유·검색 썸네일(OG image). 1200×630 권장" }
          - { name: draft, label: "초안(체크 시 비공개)", widget: boolean, default: false }
          - { name: body, label: "본문", widget: markdown, hint: "H2/H3 소제목으로 구조화하고, 첫 문단에 결론을 먼저. 표·목록은 AI 인용에 유리(GEO)" }
