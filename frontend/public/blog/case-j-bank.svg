<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="J은행 AI 챗봇 RAG sLLM 사례">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f8ff"/>
      <stop offset="1" stop-color="#e7f0ff"/>
    </linearGradient>
    <linearGradient id="badge3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0b2560" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg3)"/>
  <circle cx="1080" cy="90" r="220" fill="#2563eb" opacity="0.06"/>
  <circle cx="140" cy="620" r="180" fill="#1e40af" opacity="0.05"/>

  <text x="92" y="120" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#1d4ed8">CASE STUDY · 금융</text>
  <rect x="92" y="150" width="96" height="96" rx="24" fill="url(#badge3)"/>
  <text x="140" y="216" text-anchor="middle" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">J</text>
  <text x="92" y="330" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="46" font-weight="800" fill="#0f172a">근거 있는 답변,</text>
  <text x="92" y="388" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="46" font-weight="800" fill="#1d4ed8">금융 특화 AI 챗봇</text>
  <rect x="92" y="440" width="360" height="52" rx="26" fill="#dbeafe"/>
  <text x="118" y="474" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="24" font-weight="700" fill="#1e40af">RAG · sLLM · 출처 명시</text>

  <!-- motif: chat window with shield + table -->
  <g filter="url(#sh3)">
    <rect x="628" y="150" width="484" height="392" rx="28" fill="#ffffff"/>
  </g>
  <circle cx="664" cy="188" r="7" fill="#f87171"/><circle cx="688" cy="188" r="7" fill="#fbbf24"/><circle cx="712" cy="188" r="7" fill="#34d399"/>
  <!-- user bubble -->
  <rect x="820" y="224" width="256" height="52" rx="16" fill="#eff6ff"/>
  <rect x="844" y="243" width="208" height="14" rx="7" fill="#93c5fd"/>
  <!-- bot bubble -->
  <rect x="660" y="292" width="300" height="86" rx="16" fill="#f1f5f9"/>
  <rect x="684" y="312" width="252" height="13" rx="6" fill="#cbd5e1"/>
  <rect x="684" y="336" width="220" height="13" rx="6" fill="#cbd5e1"/>
  <rect x="684" y="358" width="120" height="12" rx="6" fill="#2563eb"/>
  <!-- mini table (LTV abstract) -->
  <rect x="660" y="398" width="300" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <line x1="660" y1="432" x2="960" y2="432" stroke="#e2e8f0"/>
  <line x1="820" y1="398" x2="820" y2="518" stroke="#e2e8f0"/>
  <rect x="678" y="410" width="80" height="12" rx="6" fill="#94a3b8"/><rect x="838" y="410" width="70" height="12" rx="6" fill="#94a3b8"/>
  <rect x="678" y="446" width="70" height="11" rx="5" fill="#cbd5e1"/><rect x="838" y="446" width="50" height="11" rx="5" fill="#2563eb"/>
  <rect x="678" y="476" width="70" height="11" rx="5" fill="#cbd5e1"/><rect x="838" y="476" width="50" height="11" rx="5" fill="#60a5fa"/>
  <!-- shield badge -->
  <g transform="translate(998,404)">
    <path d="M40 0 L78 16 V44 C78 74 62 92 40 104 C18 92 2 74 2 44 V16 Z" fill="#2563eb"/>
    <path d="M24 52 l12 12 l22 -26" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
