<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="I사 이커머스·미디어 AI 검색 사례">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5faff"/>
      <stop offset="1" stop-color="#eaf4ff"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1e3a8a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="90" r="220" fill="#0ea5e9" opacity="0.06"/>
  <circle cx="140" cy="620" r="180" fill="#2563eb" opacity="0.05"/>

  <!-- left column -->
  <text x="92" y="120" font-family="system-ui,'Segoe UI','Malgun Gothic',sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#0284c7">CASE STUDY · 이커머스 · 미디어</text>
  <rect x="92" y="150" width="96" height="96" rx="24" fill="url(#badge)"/>
  <text x="140" y="216" text-anchor="middle" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">I</text>
  <text x="92" y="330" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="46" font-weight="800" fill="#0f172a">AI 검색으로</text>
  <text x="92" y="388" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="46" font-weight="800" fill="#0284c7">찾는 경험을 바꾸다</text>
  <rect x="92" y="440" width="330" height="52" rx="26" fill="#e0f2fe"/>
  <text x="118" y="474" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="24" font-weight="700" fill="#0369a1">매출 · 트래픽 +20%</text>

  <!-- motif: search UI window -->
  <g filter="url(#sh)">
    <rect x="628" y="150" width="484" height="392" rx="28" fill="#ffffff"/>
  </g>
  <circle cx="664" cy="188" r="7" fill="#f87171"/><circle cx="688" cy="188" r="7" fill="#fbbf24"/><circle cx="712" cy="188" r="7" fill="#34d399"/>
  <!-- search bar -->
  <rect x="660" y="224" width="420" height="60" rx="30" fill="#f1f5f9" stroke="#e2e8f0"/>
  <circle cx="1050" cy="254" r="16" fill="none" stroke="#0ea5e9" stroke-width="5"/>
  <line x1="1062" y1="266" x2="1074" y2="278" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
  <rect x="686" y="245" width="230" height="18" rx="9" fill="#cbd5e1"/>
  <!-- product tiles -->
  <g>
    <rect x="660" y="312" width="126" height="200" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="676" y="328" width="94" height="80" rx="10" fill="#bae6fd"/>
    <rect x="676" y="424" width="80" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="676" y="448" width="54" height="14" rx="7" fill="#0ea5e9"/>
  </g>
  <g>
    <rect x="807" y="312" width="126" height="200" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="823" y="328" width="94" height="80" rx="10" fill="#93c5fd"/>
    <rect x="823" y="424" width="80" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="823" y="448" width="54" height="14" rx="7" fill="#2563eb"/>
  </g>
  <g>
    <rect x="954" y="312" width="126" height="200" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <rect x="970" y="328" width="94" height="80" rx="10" fill="#c7d2fe"/>
    <rect x="970" y="424" width="80" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="970" y="448" width="54" height="14" rx="7" fill="#4f46e5"/>
  </g>
</svg>
