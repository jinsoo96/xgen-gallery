  </defs>
  <rect width="1200" height="675" fill="url(#bg6)"/>
  <circle cx="1080" cy="90" r="220" fill="#10b981" opacity="0.06"/>
  <circle cx="140" cy="620" r="180" fill="#0d9488" opacity="0.05"/>

  <text x="92" y="120" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#059669">CASE STUDY · 기업 내부 업무</text>
