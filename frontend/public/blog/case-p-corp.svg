      <stop offset="0" stop-color="#f1fdf8"/>
      <stop offset="1" stop-color="#e4faf0"/>
    </linearGradient>
    <linearGradient id="badge6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0d9488"/>
