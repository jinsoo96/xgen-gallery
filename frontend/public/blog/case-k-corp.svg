<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="K공사 SRM AI CS 챗봇 사례">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f5ff"/>
      <stop offset="1" stop-color="#ebebff"/>
    </linearGradient>
    <linearGradient id="badge4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1e1b4b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <circle cx="1080" cy="90" r="220" fill="#4f46e5" opacity="0.06"/>
  <circle cx="140" cy="620" r="180" fill="#3730a3" opacity="0.05"/>

  <text x="92" y="120" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#4338ca">CASE STUDY · 공공기관</text>
  <rect x="92" y="150" width="96" height="96" rx="24" fill="url(#badge4)"/>
  <text x="140" y="216" text-anchor="middle" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">K</text>
  <text x="92" y="330" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="46" font-weight="800" fill="#0f172a">조달 업무를 처리하는</text>
  <text x="92" y="388" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="46" font-weight="800" fill="#4338ca">Actionable AI 챗봇</text>
  <rect x="92" y="440" width="360" height="52" rx="26" fill="#e0e7ff"/>
  <text x="118" y="474" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="24" font-weight="700" fill="#3730a3">SRM 연동 · 상담 자동화</text>

  <!-- motif: chatbot + procurement checklist -->
  <g filter="url(#sh4)">
    <rect x="628" y="150" width="484" height="392" rx="28" fill="#ffffff"/>
  </g>
  <circle cx="664" cy="188" r="7" fill="#f87171"/><circle cx="688" cy="188" r="7" fill="#fbbf24"/><circle cx="712" cy="188" r="7" fill="#34d399"/>
