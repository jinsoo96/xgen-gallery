  <rect x="708" y="228" width="320" height="52" rx="16" fill="#eef2ff"/>
  <rect x="730" y="247" width="220" height="14" rx="7" fill="#a5b4fc"/>
  <!-- procurement checklist -->
  <rect x="660" y="300" width="416" height="218" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <g>
    <rect x="682" y="322" width="26" height="26" rx="7" fill="#4f46e5"/>
    <path d="M688 335 l5 5 l9 -11" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="722" y="328" width="180" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="930" y="328" width="120" height="14" rx="7" fill="#e2e8f0"/>
