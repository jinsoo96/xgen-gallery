  </defs>
  <rect width="1200" height="675" fill="url(#bg5)"/>
  <circle cx="1080" cy="90" r="220" fill="#06b6d4" opacity="0.06"/>
  <circle cx="140" cy="620" r="180" fill="#2563eb" opacity="0.05"/>

  <text x="92" y="120" font-family="system-ui,'Malgun Gothic',sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#0891b2">CASE STUDY · IT 서비스</text>
  <rect x="92" y="150" width="96" height="96" rx="24" fill="url(#badge5)"/>
  <text x="140" y="216" text-anchor="middle" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">S</text>
