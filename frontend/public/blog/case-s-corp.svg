      <stop offset="0" stop-color="#f2fbff"/>
      <stop offset="1" stop-color="#e4f6ff"/>
    </linearGradient>
    <linearGradient id="badge5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="sh5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#083344" flood-opacity="0.14"/>
