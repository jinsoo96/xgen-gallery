services:
  frontend:
    build:
      context: ./frontend
      args:
        # 브라우저에서 backend에 접근하는 URL (빌드 시 주입)
        NEXT_PUBLIC_GALLERY_API_URL: http://localhost:8800
    ports:
      - "3100:3000"
    env_file:
      - .env
    environment:
      # Members 탭: GitHub Org People 동적 로드용 (서버 캐시 30분)
      GITHUB_ORG: "${GITHUB_ORG:-PlateerLab}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      MEMBERS_REVALIDATE_SECONDS: "${MEMBERS_REVALIDATE_SECONDS:-1800}"
      MEMBERS_REVALIDATE_TOKEN: "${MEMBERS_REVALIDATE_TOKEN:-}"
      # Members 데이터 소스: 설정 시 GitHub 직접 호출 대신 다른 갤러리 배포본의
      # /api/members(목록)·/api/members/{login}(상세)에서 가져옴.
      # ⚠️ 기본값은 반드시 비워둘 것. 이 박스(go244)의 공개 도메인
      # (gallery-xgen.x2bee.com)은 AWS nginx를 거쳐 다시 이 박스로 프록시되므로,
      # 그 도메인을 upstream으로 지정하면 앱이 자기 자신을 호출하는 무한 루프 →
      # 타임아웃 → 502가 된다. 이 박스는 GITHUB_TOKEN을 가지고 GitHub를 직접 친다.
      MEMBERS_UPSTREAM_URL: "${MEMBERS_UPSTREAM_URL:-}"
      # /demo 폼 수신 웹훅 — Google Apps Script 웹앱 URL (시트 저장 + 이메일 발송).
      # 설정 방법: docs/demo-webhook.gs 참고. 비어 있으면 서버 로그로만 기록.
      DEMO_WEBHOOK_URL: "${DEMO_WEBHOOK_URL:-}"
      # /newsletter 구독 수신 웹훅 — Google Apps Script 웹앱 URL (시트 upsert + 확인 메일).
      # 설정 방법: docs/newsletter-webhook.gs 참고. 비어 있으면 서버 로그로만 기록.
      NEWSLETTER_WEBHOOK_URL: "${NEWSLETTER_WEBHOOK_URL:-}"
      # 블로그 어드민(Decap CMS) GitHub OAuth — docs/blog-cms.md 참고.
      GITHUB_OAUTH_CLIENT_ID: "${GITHUB_OAUTH_CLIENT_ID:-}"
      GITHUB_OAUTH_CLIENT_SECRET: "${GITHUB_OAUTH_CLIENT_SECRET:-}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8800:8000"
    env_file:
      - .env
    environment:
      # Synaptic Memory graph persistence (per-container unless volume mounted)
      SYNAPTIC_DB: /tmp/synaptic.db
      # Embeddings (Qwen vLLM by default, no auth).
      SYNAPTIC_EMBED_URL: "${SYNAPTIC_EMBED_URL:-}"
      SYNAPTIC_EMBED_MODEL: "${SYNAPTIC_EMBED_MODEL:-default}"
      # LLM chat completions (OpenAI-compatible upstream).
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.openai.com/v1}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      # Legacy fallback for the openai-proxy path.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
