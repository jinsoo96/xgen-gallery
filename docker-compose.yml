services:
  frontend:
    build:
      context: ./frontend
      args:
        # 브라우저에서 backend에 접근하는 URL (빌드 시 주입)
        NEXT_PUBLIC_GALLERY_API_URL: http://localhost:8800
    ports:
      - "3100:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8800:8000"
    env_file:
      - .env
    environment:
      # Synaptic Memory graph persistence (per-container unless volume mounted)
      SYNAPTIC_DB: /tmp/synaptic.db
      # Semantic search. Empty → FTS-only.
      # Defaults to local OpenAI proxy inside the backend container.
      SYNAPTIC_EMBED_URL: "${SYNAPTIC_EMBED_URL:-}"
      SYNAPTIC_EMBED_MODEL: "${SYNAPTIC_EMBED_MODEL:-default}"
      # Used by /openai-proxy/v1/* handler (never committed).
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
